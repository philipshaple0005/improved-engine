  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.9); }
      50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(124, 58, 237, 0); }
    }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes scan-line {
      0% { top: 0; }
      50% { top: calc(100% - 3px); }
      100% { top: 0; }
    }
    .scanning .scan-line { animation: scan-line 1.5s ease-in-out infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin { animation: spin 1s linear infinite; }
    .slot-hover:hover { transform: scale(1.02); }
    .btn-press:active { transform: scale(0.97); }
  </style>
</head>

                    <div key={idx} className="flex items-center justify-between rounded-2xl bg-white/55 p-3">
                      <div className="flex items-center gap-3">
                        <span className={`grid h-8 w-8 place-items-center rounded-lg ${item.status === "success" ? "bg-emerald-100" : "bg-red-100"}`}>
                          {item.status === "success" ? <span className="text-emerald-600"><Icons.Check /></span> : <span className="text-red-500"><Icons.X /></span>}
                        </span>
                        <div><p className="font-medium text-slate-700">{item.order} → {item.slot}</p><p className="text-xs text-slate-400">{item.platform} · {item.operator}{item.reason && <span className="text-red-500"> · {item.reason}</span>}</p></div>
                      </div>
                      <span className="text-sm text-slate-400">{item.time}</span>
                    </div>
                  ))}
                </div>
              </ShellCard>
            </div>

            <ShellCard className="p-6">
              <div className="mb-4 flex items-center justify-between"><h3 className="text-lg font-semibold text-slate-900">空闲格口</h3><span className="rounded-full bg-emerald-50 px-3 py-1 text-sm font-semibold text-emerald-600">{allSlots.length} 个可用</span></div>
              {selectedOrder && (
                <div className="mb-4 rounded-2xl bg-violet-50 p-4">
                  <p className="mb-2 text-sm font-medium text-violet-700">即将绑定</p>
                  <p className="font-semibold text-slate-800">{selectedOrder.id}</p>
                  <p className="text-sm text-slate-500">{selectedOrder.platform} · {selectedOrder.items}件</p>
                </div>
              )}
              <div className="mb-6 grid grid-cols-4 gap-2">
                {allSlots.map(slot => (
                  <button key={slot.code} onClick={() => setSelectedSlot(slot.code)} className={`flex h-[70px] flex-col items-center justify-center rounded-2xl border text-sm transition-all ${selectedSlot === slot.code ? "border-violet-300 bg-violet-50 ring-2 ring-violet-400 shadow-[0_8px_18px_rgba(124,92,255,0.18)]" : "border-slate-200/80 bg-white/70 text-slate-600 hover:bg-white"}`}>
                    <span className="font-semibold">{slot.code}</span>
                    <span className="mt-1 flex items-center gap-1 text-xs text-emerald-500"><span className="h-1.5 w-1.5 rounded-full bg-emerald-500" />正常</span>
                  </button>
                ))}
              </div>
              {selectedOrder && (
                <div className="space-y-3">
                  <button onClick={() => setShowConfirm(true)} className="flex h-14 w-full items-center justify-center gap-2 rounded-2xl bg-violet-600 text-base font-semibold text-white shadow-[0_12px_24px_rgba(124,58,237,0.25)] hover:bg-violet-700"><Icons.Link2 /> 确认绑定到 {selectedSlot}</button>
                  <button onClick={() => setSelectedOrder(null)} className="flex h-12 w-full items-center justify-center gap-2 rounded-2xl border border-slate-200 bg-white/70 text-sm font-semibold text-slate-600 hover:bg-white">取消选择</button>
                </div>
              )}
              <div className="mt-6 border-t border-slate-100 pt-4">
                <p className="mb-3 text-sm font-medium text-slate-600">按货架筛选</p>
                <div className="flex flex-wrap gap-2">
                  {["全部", "A货架", "B货架", "C货架"].map(shelf => (
                    <button key={shelf} className={`rounded-xl border px-3 py-1.5 text-xs font-medium transition-all ${shelf === "全部" ? "border-violet-200 bg-violet-50 text-violet-600" : "border-slate-200 bg-white/70 text-slate-500 hover:bg-white"}`}>{shelf}</button>
                  ))}
                </div>
              </div>
            </ShellCard>
          </section>

          {bindSuccess && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm">
              <ShellCard className="mx-4 w-[400px] p-8 text-center">
                <div className="mb-4 grid place-items-center">
                  <div className="relative">
                    <div className="grid h-20 w-20 place-items-center rounded-full bg-emerald-100"><Icons.CheckCircle2 /></div>
                    <span className="absolute -right-1 -top-1 grid h-6 w-6 place-items-center rounded-full bg-emerald-500 text-white"><Icons.Check /></span>
                  </div>
                </div>
                <h3 className="mb-2 text-2xl font-semibold text-slate-900">绑定成功</h3>
                <p className="mb-6 text-slate-500">订单已成功绑定到格口 {selectedSlot || scanResult?.suggest}</p>
                <div className="rounded-2xl bg-slate-50 p-4"><div className="flex justify-between text-sm"><span className="text-slate-400">灯光状态</span><span className="font-semibold text-emerald-600">已点亮</span></div></div>
              </ShellCard>
            </div>
          )}

          {showConfirm && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm">
              <ShellCard className="mx-4 w-[440px] p-6">
                <div className="mb-5 flex items-center justify-between"><h3 className="text-xl font-semibold text-slate-900">确认绑定</h3><button onClick={() => setShowConfirm(false)} className="grid h-8 w-8 place-items-center rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200"><Icons.X /></button></div>
                <div className="mb-6 space-y-3">
                  <div className="flex items-center justify-between rounded-2xl bg-slate-50 p-4"><span className="text-slate-500">订单号</span><span className="font-semibold text-slate-800">{selectedOrder?.id || manualOrder || scanResult?.order}</span></div>
                  <div className="flex items-center justify-between rounded-2xl bg-slate-50 p-4"><span className="text-slate-500">绑定格口</span><span className="font-semibold text-violet-600">{selectedSlot || scanResult?.suggest || manualSlot}</span></div>
                </div>
                <div className="flex gap-3">
                  <SoftButton className="flex-1" onClick={() => setShowConfirm(false)}>取消</SoftButton>
                  <button onClick={handleConfirmBind} className="flex h-12 flex-1 items-center justify-center gap-2 rounded-2xl bg-violet-600 text-sm font-semibold text-white shadow-[0_12px_24px_rgba(124,58,237,0.25)] hover:bg-violet-700"><Icons.Check /> 确认绑定</button>
                </div>
              </ShellCard>
            </div>
          )}
        </>
      );
    }

    // 主组件
    function App() {
      const [currentPage, setCurrentPage] = useState(1);

      const menuItems = [
        { icon: Icons.Home, label: "首页总览" },
        { icon: Icons.ClipboardList, label: "订单管理" },
        { icon: Icons.Package, label: "商品管理" },
        { icon: Icons.Boxes, label: "库存管理" },
        { icon: Icons.Box, label: "智能外卖架", page: 1 },
        { icon: Icons.Lightbulb, label: "灯控中心" },
        { icon: Icons.RefreshCw, label: "平台同步" },
        { icon: Icons.Settings, label: "系统设置" },
      ];

      return (
        <div className="min-h-screen overflow-hidden bg-[#eef0f0] p-6 text-slate-800">
          <div className="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_18%_10%,rgba(255,255,255,0.96),transparent_30%),radial-gradient(circle_at_82%_0%,rgba(219,226,255,0.55),transparent_26%),linear-gradient(135deg,rgba(255,255,255,0.42),rgba(220,225,230,0.25))]" />

          <div className="relative mx-auto flex max-w-[1680px] gap-4">
            <aside className="w-[276px] shrink-0 rounded-[34px] border border-white/85 bg-white/58 p-4 shadow-[14px_22px_48px_rgba(45,55,72,0.16),inset_0_1px_0_rgba(255,255,255,0.96)] backdrop-blur-2xl">
              <div className="mb-8 flex items-center justify-between">
                <div className="grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-slate-900 to-slate-700 text-white shadow-[0_14px_24px_rgba(15,23,42,0.22)]"><Icons.Store /></div>
                <button className="grid h-10 w-10 place-items-center rounded-2xl border border-white bg-white/70 shadow-[0_8px_18px_rgba(30,40,60,0.10)]"><Icons.MoreHorizontal /></button>
              </div>
              <p className="mb-3 pl-3 text-sm font-medium text-slate-400">主菜单</p>
              <nav className="space-y-2">
                {menuItems.map(item => (
                  <button key={item.label} onClick={() => item.page ? setCurrentPage(item.page) : null} className={`flex h-12 w-full items-center gap-3 rounded-2xl px-4 text-[15px] font-medium transition-all ${item.page && currentPage === item.page ? "bg-white text-violet-700 shadow-[inset_0_1px_0_rgba(255,255,255,0.96),0_14px_24px_rgba(60,70,90,0.12)]" : item.label === "智能外卖架" && currentPage ? "bg-white text-violet-700 shadow-[inset_0_1px_0_rgba(255,255,255,0.96),0_14px_24px_rgba(60,70,90,0.12)]" : "text-slate-600 hover:bg-white/60"}`}>
                    <item.icon /> <span>{item.label}</span>
                  </button>
                ))}
              </nav>
              <div className="mt-24 space-y-3">
                <ShellCard className="p-4">
                  <div className="flex items-center gap-3">
                    <div className="grid h-11 w-11 place-items-center rounded-2xl bg-white shadow-inner"><Icons.Store /></div>
                    <div><p className="font-semibold text-slate-800">美味小屋便利店</p><p className="text-sm text-slate-400">当前门店</p></div>
                  </div>
                </ShellCard>
                <ShellCard className="p-4">
                  <div className="space-y-2 text-sm"><p className="flex items-center gap-2 text-slate-500"><span className="h-2 w-2 rounded-full bg-emerald-500" /> 货架系统</p><p className="font-semibold text-emerald-600">运行正常</p></div>
                </ShellCard>
              </div>
            </aside>

            <main className="flex-1 rounded-[34px] border border-white/85 bg-white/62 p-8 shadow-[14px_22px_54px_rgba(45,55,72,0.14),inset_0_1px_0_rgba(255,255,255,0.96)] backdrop-blur-2xl">
              {currentPage === 1 ? <Page1_ShelfBoard onNavigate={setCurrentPage} /> : <Page2_OrderBinding onNavigate={setCurrentPage} />}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

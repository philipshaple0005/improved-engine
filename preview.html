                <div className="rounded-2xl bg-slate-50/80 p-4"><p className="text-sm text-slate-500">已选择 <span className="font-semibold text-violet-600">{selectedModules.length}</span> 个模块</p></div>
              </Card>
              <Card className="p-5">
                <h3 className="mb-4 text-lg font-semibold text-slate-900">批量操作</h3>
                <div className="space-y-3">
                  <button disabled={selectedModules.length === 0} className={`flex w-full h-12 items-center gap-3 rounded-2xl border px-4 text-sm font-semibold transition-all ${selectedModules.length > 0 ? "border-emerald-200 bg-emerald-50 text-emerald-600 hover:bg-emerald-100" : "border-slate-200 bg-slate-50 text-slate-400"}`}><Lightbulb size={18} /> 批量点亮</button>
                  <button disabled={selectedModules.length === 0} className={`flex w-full h-12 items-center gap-3 rounded-2xl border px-4 text-sm font-semibold transition-all ${selectedModules.length > 0 ? "border-slate-200 bg-white text-slate-600 hover:bg-slate-50" : "border-slate-200 bg-slate-50 text-slate-400"}`}><EyeOff size={18} /> 批量关闭</button>
                  <button disabled={selectedModules.length === 0} className={`flex w-full h-12 items-center gap-3 rounded-2xl border px-4 text-sm font-semibold transition-all ${selectedModules.length > 0 ? "border-amber-200 bg-amber-50 text-amber-600 hover:bg-amber-100" : "border-slate-200 bg-slate-50 text-slate-400"}`}><SlidersHorizontal size={18} /> 设置亮度</button>
                  <button disabled={selectedModules.length === 0} className={`flex w-full h-12 items-center gap-3 rounded-2xl border px-4 text-sm font-semibold transition-all ${selectedModules.length > 0 ? "border-blue-200 bg-blue-50 text-blue-600 hover:bg-blue-100" : "border-slate-200 bg-slate-50 text-slate-400"}`}><Zap size={18} /> 设置模式</button>
                  <button disabled={selectedModules.length === 0} className={`flex w-full h-12 items-center gap-3 rounded-2xl border px-4 text-sm font-semibold transition-all ${selectedModules.length > 0 ? "border-violet-200 bg-violet-50 text-violet-600 hover:bg-violet-100" : "border-slate-200 bg-slate-50 text-slate-400"}`}><Settings2 size={18} /> 设为维护</button>
                  <button disabled={selectedModules.length === 0} className={`flex w-full h-12 items-center gap-3 rounded-2xl border px-4 text-sm font-semibold transition-all ${selectedModules.length > 0 ? "border-slate-200 bg-white text-slate-600 hover:bg-slate-50" : "border-slate-200 bg-slate-50 text-slate-400"}`}><RefreshCw size={18} /> 批量升级固件</button>
                </div>
              </Card>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

// ========== App ==========
function App() {
  const [page, setPage] = useState("kanban");
  return (
    <>
      <div className="page-nav">
        <button className={page === "kanban" ? "active" : ""} onClick={() => setPage("kanban")}>格口看板</button>
        <button className={page === "order" ? "active" : ""} onClick={() => setPage("order")}>订单绑定</button>
        <button className={page === "module" ? "active" : ""} onClick={() => setPage("module")}>模块管理</button>
      </div>
      {page === "kanban" && <ShelfKanban />}
      {page === "order" && <OrderBinding />}
      {page === "module" && <LightModuleManagement />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
